<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ibiz Restaurant – Ordering App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FF6F00;--orange-dark:#E65100;--orange-light:#FFF8F0;
  --orange-pale:#FFE0B2;--red:#D84315;--bg:#f5f5f5;
  --white:#fff;--text:#212121;--text2:#616161;--text3:#9E9E9E;
  --border:#EEEEEE;--radius:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;display:flex;justify-content:center}
/* Phone frame */
#app{width:390px;min-height:100vh;background:var(--white);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.15)}
/* Pages */
.page{display:none;flex-direction:column;flex:1;height:100%;overflow:hidden}
.page.active{display:flex}
/* Header */
.header{background:var(--white);padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;min-height:60px;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:700;color:var(--text);flex:1}
.back-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:var(--text);display:flex;align-items:center;font-size:20px;transition:background .2s}
.back-btn:hover{background:var(--bg)}
.header-actions{display:flex;gap:8px}
.icon-btn{background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;position:relative;font-size:18px;transition:background .2s;color:var(--text)}
.icon-btn:hover{background:var(--bg)}
.badge{position:absolute;top:2px;right:2px;background:var(--orange);color:#fff;border-radius:10px;font-size:9px;font-weight:700;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px}
/* Banner */
.banner{background:linear-gradient(135deg,var(--orange),#F57C00);padding:20px 16px;text-align:center}
.banner h2{color:#fff;font-size:20px;font-weight:800;margin-bottom:4px}
.banner p{color:#FFE0B2;font-size:12px;font-weight:500}
/* Search */
.search-bar{padding:10px 16px;background:var(--white);border-bottom:1px solid var(--orange-pale)}
.search-bar input{width:100%;border:1.5px solid var(--orange-pale);border-radius:24px;padding:10px 16px;font-size:14px;font-family:inherit;outline:none;background:var(--orange-light);transition:border .2s}
.search-bar input:focus{border-color:var(--orange)}
/* Category chips */
.categories{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;background:var(--white);border-bottom:1px solid var(--border)}
.categories::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 16px;border-radius:20px;border:1.5px solid #BDBDBD;background:#fff;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s;font-family:inherit}
.chip.active{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:700}
/* Menu list */
.scroll-area{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:10px}
.scroll-area::-webkit-scrollbar{width:4px}
.scroll-area::-webkit-scrollbar-thumb{background:var(--orange-pale);border-radius:4px}
/* Menu card */
.menu-card{background:var(--white);border-radius:var(--radius);padding:14px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 1px 6px rgba(0,0,0,.06);transition:transform .15s,box-shadow .15s}
.menu-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,111,0,.12)}
.menu-card-info{flex:1}
.menu-card-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px}
.menu-card-desc{font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.4}
.menu-card-cat{font-size:10px;background:var(--orange-light);color:var(--orange-dark);padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block}
.menu-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;min-width:80px}
.menu-card-price{font-size:16px;font-weight:800;color:var(--red)}
.add-btn{background:var(--orange);color:#fff;border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s,transform .1s}
.add-btn:hover{background:var(--orange-dark)}
.add-btn:active{transform:scale(.95)}
/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:15px;font-weight:600;margin-bottom:4px;color:var(--text2)}
.empty small{font-size:13px}
/* Toast */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:#323232;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s,transform .3s;z-index:1000;pointer-events:none;white-space:nowrap}
#toast.show{opacity:.93;transform:translateX(-50%) translateY(0)}
/* Cart */
.cart-item{background:var(--white);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.cart-item-name{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.cart-item-price{font-size:13px;color:var(--red);font-weight:700}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--orange);background:#fff;color:var(--orange);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit}
.qty-btn:hover{background:var(--orange);color:#fff}
.qty-num{font-size:15px;font-weight:700;min-width:20px;text-align:center}
.remove-btn{background:none;border:none;cursor:pointer;color:#E53935;font-size:18px;padding:4px;border-radius:6px;transition:background .2s}
.remove-btn:hover{background:#fce8e8}
/* Cart footer */
.cart-footer{padding:16px;border-top:1px solid var(--border);background:var(--white)}
.bill-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.bill-label{font-size:13px;color:var(--text2)}
.bill-total{font-size:22px;font-weight:800;color:var(--red)}
.primary-btn{width:100%;padding:14px;background:var(--orange);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s,transform .1s;margin-top:8px}
.primary-btn:hover{background:var(--orange-dark)}
.primary-btn:active{transform:scale(.98)}
.primary-btn:disabled{background:#BDBDBD;cursor:not-allowed}
/* Place order */
.form-section{padding:16px;border-bottom:1px solid var(--border)}
.section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px}
.summary-card{background:var(--orange-light);border-radius:var(--radius);padding:14px;margin:12px;border:1px solid var(--orange-pale)}
.summary-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--orange-pale);font-size:13px;color:var(--text2)}
.summary-row:last-child{border-bottom:none;font-weight:700;font-size:15px;color:var(--text)}
.summary-row span:last-child{color:var(--red);font-weight:700}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-group input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-family:inherit;outline:none;transition:border .2s}
.form-group input:focus{border-color:var(--orange)}
.form-group input.error{border-color:#E53935}
.field-error{font-size:11px;color:#E53935;margin-top:4px;display:none}
.field-error.show{display:block}
.btn-row{display:flex;gap:10px;margin-top:4px}
.cancel-btn{flex:.4;padding:13px;background:#f0f0f0;color:var(--text2);border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
.cancel-btn:hover{background:#e0e0e0}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:20px;padding:28px 24px;width:320px;text-align:center;transform:scale(.9);transition:transform .3s}
.modal-overlay.show .modal{transform:scale(1)}
.modal h2{font-size:20px;font-weight:800;margin-bottom:12px}
.modal p{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:20px}
/* Order history */
.order-card{background:var(--white);border-radius:var(--radius);margin:8px 12px;padding:14px 14px 14px 18px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-left:4px solid var(--orange)}
.order-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.order-badge{background:var(--orange);color:#fff;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700}
.order-date{font-size:11px;color:var(--text3)}
.order-meta{display:flex;gap:16px;margin-bottom:6px}
.order-meta span{font-size:13px;font-weight:600;color:var(--text)}
.order-items{font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.5}
.order-total{font-size:15px;font-weight:800;color:var(--red)}
/* Responsive - full screen on mobile */
@media(max-width:420px){#app{width:100%;box-shadow:none}}
</style>
</head>
<body>
<div id="app">

  <!-- ═══ PAGE 1: HOME ═══ -->
  <div class="page active" id="page-home">
    <div class="header">
      <h1>🍽 ibiz Restaurant</h1>
      <div class="header-actions">
        <button class="icon-btn" onclick="goTo('cart')" title="Cart">
          🛒<span class="badge" id="cart-badge" style="display:none">0</span>
        </button>
        <button class="icon-btn" onclick="goTo('history')" title="Order History">📋</button>
      </div>
    </div>
    <div class="banner">
      <h2>🍽 ibiz Restaurant</h2>
      <p>Authentic Flavors | Fine Dining</p>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="🔍  Search food items..." oninput="applyFilter()">
    </div>
    <div class="categories" id="categories">
      <button class="chip active" onclick="selectCategory('All',this)">All</button>
      <button class="chip" onclick="selectCategory('Starters',this)">Starters</button>
      <button class="chip" onclick="selectCategory('Main Course',this)">Main Course</button>
      <button class="chip" onclick="selectCategory('Chinese',this)">Chinese</button>
      <button class="chip" onclick="selectCategory('Beverages',this)">Beverages</button>
    </div>
    <div class="scroll-area" id="menu-list">
      <div class="empty"><div class="icon">⏳</div><p>Loading menu…</p></div>
    </div>
  </div>

  <!-- ═══ PAGE 2: CART ═══ -->
  <div class="page" id="page-cart">
    <div class="header">
      <button class="back-btn" onclick="goTo('home')">←</button>
      <h1>My Cart</h1>
    </div>
    <div class="scroll-area" id="cart-list" style="padding:12px"></div>
    <div class="cart-footer" id="cart-footer">
      <div class="bill-row">
        <span class="bill-label">Items in Cart</span>
        <span id="cart-count-label" style="font-weight:700;font-size:14px">0 item(s)</span>
      </div>
      <div class="bill-row">
        <span style="font-weight:700;font-size:15px">Total Amount</span>
        <span class="bill-total" id="cart-total">₹0</span>
      </div>
      <button class="primary-btn" id="checkout-btn" onclick="goTo('placeorder')" disabled>Cart is Empty</button>
    </div>
  </div>

  <!-- ═══ PAGE 3: PLACE ORDER ═══ -->
  <div class="page" id="page-placeorder">
    <div class="header">
      <button class="back-btn" onclick="goTo('cart')">←</button>
      <h1>Place Order</h1>
    </div>
    <div style="flex:1;overflow-y:auto">
      <div style="padding:12px 0 0">
        <div class="summary-card" id="order-summary"></div>
      </div>
      <div style="padding:16px">
        <div class="section-title">👤 Customer Details</div>
        <div class="form-group">
          <label>Customer Name *</label>
          <input type="text" id="customer-name" placeholder="Enter your name">
          <div class="field-error" id="name-error">⚠ Please enter your name</div>
        </div>
        <div class="form-group">
          <label>Table Number *</label>
          <input type="text" id="table-number" placeholder="e.g. 5 or A2">
          <div class="field-error" id="table-error">⚠ Please enter your table number</div>
        </div>
        <div class="btn-row">
          <button class="cancel-btn" onclick="goTo('cart')">Cancel</button>
          <button class="primary-btn" style="flex:.6;margin-top:0" onclick="confirmOrder()">✓ Confirm Order</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ PAGE 4: ORDER HISTORY ═══ -->
  <div class="page" id="page-history">
    <div class="header">
      <button class="back-btn" onclick="goTo('home')">←</button>
      <h1>Order History</h1>
    </div>
    <div class="scroll-area" id="history-list" style="padding:8px 0"></div>
  </div>

</div>

<!-- Success Modal -->
<div class="modal-overlay" id="success-modal">
  <div class="modal">
    <div style="font-size:48px;margin-bottom:8px">🎉</div>
    <h2>Order Placed!</h2>
    <p id="success-msg"></p>
    <button class="primary-btn" style="margin-top:0" onclick="closeModal()">Back to Menu</button>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:5001';
let allMenuItems = [];
let selectedCategory = 'All';
let cart = []; // {id, name, price, quantity}

// ── Navigation ──────────────────────────────────────────────
function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (page === 'cart') renderCart();
  if (page === 'placeorder') renderSummary();
  if (page === 'history') loadHistory();
}

// ── Cart logic ───────────────────────────────────────────────
function addToCart(id, name, price) {
  const existing = cart.find(i => i.id === id);
  if (existing) { existing.quantity++; }
  else { cart.push({id, name, price, quantity: 1}); }
  updateBadge();
  showToast('✓ ' + name + ' added to cart');
}

function increaseQty(id) {
  const item = cart.find(i => i.id === id);
  if (item) item.quantity++;
  renderCart();
}

function decreaseQty(id) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  if (item.quantity > 1) { item.quantity--; }
  else { cart = cart.filter(i => i.id !== id); }
  renderCart();
}

function removeItem(id) {
  cart = cart.filter(i => i.id !== id);
  renderCart();
}

function getTotal() { return cart.reduce((s,i) => s + i.price * i.quantity, 0); }
function getCount() { return cart.reduce((s,i) => s + i.quantity, 0); }
function getItemsString() { return cart.map(i => i.name + ' x' + i.quantity).join(', '); }

function updateBadge() {
  const c = getCount();
  const b = document.getElementById('cart-badge');
  b.textContent = c;
  b.style.display = c > 0 ? 'flex' : 'none';
}

// ── Menu ─────────────────────────────────────────────────────
async function loadMenu() {
  try {
    const res = await fetch(API + '/menu');
    const data = await res.json();
    allMenuItems = data.items || [];
    applyFilter();
  } catch(e) {
    document.getElementById('menu-list').innerHTML =
      '<div class="empty"><div class="icon">⚠️</div><p>Could not load menu</p><small>Make sure the Flask server is running on port 5001</small></div>';
  }
}

function selectCategory(cat, el) {
  selectedCategory = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const filtered = allMenuItems.filter(item => {
    const catOk = selectedCategory === 'All' || item.category === selectedCategory;
    const searchOk = !q || item.name.toLowerCase().includes(q);
    return catOk && searchOk;
  });
  renderMenu(filtered);
}

function renderMenu(items) {
  const el = document.getElementById('menu-list');
  if (!items.length) {
    el.innerHTML = '<div class="empty"><div class="icon">🔍</div><p>No items found</p><small>Try a different search or category</small></div>';
    return;
  }
  el.innerHTML = items.map(item => `
    <div class="menu-card">
      <div class="menu-card-info">
        <div class="menu-card-name">${item.name}</div>
        <div class="menu-card-desc">${item.description}</div>
        <div class="menu-card-cat">${item.category}</div>
      </div>
      <div class="menu-card-right">
        <div class="menu-card-price">₹${item.price}</div>
        <button class="add-btn" onclick='addToCart(${item.id},"${item.name.replace(/'/g,"\\'")}",${item.price})'>+ Add</button>
      </div>
    </div>
  `).join('');
}

// ── Cart render ───────────────────────────────────────────────
function renderCart() {
  const el = document.getElementById('cart-list');
  const total = getTotal();
  const count = getCount();
  document.getElementById('cart-total').textContent = '₹' + total;
  document.getElementById('cart-count-label').textContent = count + ' item(s)';
  const btn = document.getElementById('checkout-btn');
  if (cart.length === 0) {
    btn.disabled = true; btn.textContent = 'Cart is Empty';
    el.innerHTML = `<div class="empty"><div class="icon">🛒</div><p>Your cart is empty</p><small>Go back and add some delicious items!</small></div>`;
    return;
  }
  btn.disabled = false; btn.textContent = 'Proceed to Place Order  →';
  el.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div style="flex:1">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">₹${(item.price * item.quantity)}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="decreaseQty(${item.id})">−</button>
        <span class="qty-num">${item.quantity}</span>
        <button class="qty-btn" onclick="increaseQty(${item.id})">+</button>
      </div>
      <button class="remove-btn" onclick="removeItem(${item.id})" title="Remove">🗑</button>
    </div>
  `).join('');
  updateBadge();
}

// ── Place Order ───────────────────────────────────────────────
function renderSummary() {
  const el = document.getElementById('order-summary');
  const rows = cart.map(i => `
    <div class="summary-row">
      <span>${i.name} × ${i.quantity}</span>
      <span>₹${i.price * i.quantity}</span>
    </div>`).join('');
  el.innerHTML = `<div style="font-weight:700;color:var(--orange-dark);margin-bottom:10px;font-size:14px">📋 Order Summary</div>${rows}
    <div class="summary-row" style="margin-top:8px;border-top:1px solid var(--orange-pale);padding-top:8px">
      <span style="font-weight:700;font-size:14px;color:var(--text)">Total</span>
      <span style="font-size:18px">₹${getTotal()}</span>
    </div>`;
}

async function confirmOrder() {
  const name = document.getElementById('customer-name').value.trim();
  const table = document.getElementById('table-number').value.trim();
  let valid = true;
  const ne = document.getElementById('name-error');
  const te = document.getElementById('table-error');
  const ni = document.getElementById('customer-name');
  const ti = document.getElementById('table-number');
  if (!name) { ne.classList.add('show'); ni.classList.add('error'); valid = false; }
  else { ne.classList.remove('show'); ni.classList.remove('error'); }
  if (!table) { te.classList.add('show'); ti.classList.add('error'); valid = false; }
  else { te.classList.remove('show'); ti.classList.remove('error'); }
  if (!valid) return;
  try {
    const res = await fetch(API + '/placeorder', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({customer_name:name, table_number:table, items:getItemsString(), total:getTotal()})
    });
    const data = await res.json();
    if (data.success) {
      cart = [];
      updateBadge();
      document.getElementById('customer-name').value = '';
      document.getElementById('table-number').value = '';
      document.getElementById('success-msg').innerHTML =
        `Your order has been placed successfully!<br><br>Thank you, <strong>${name}</strong>.<br>Table <strong>${table}</strong> will be served shortly.`;
      document.getElementById('success-modal').classList.add('show');
    }
  } catch(e) {
    showToast('⚠ Error placing order. Check server.');
  }
}

function closeModal() {
  document.getElementById('success-modal').classList.remove('show');
  goTo('home');
}

// ── Order History ─────────────────────────────────────────────
async function loadHistory() {
  const el = document.getElementById('history-list');
  el.innerHTML = '<div class="empty"><div class="icon">⏳</div><p>Loading…</p></div>';
  try {
    const res = await fetch(API + '/orders');
    const data = await res.json();
    const orders = data.orders || [];
    if (!orders.length) {
      el.innerHTML = '<div class="empty"><div class="icon">📄</div><p>No orders yet</p><small>Place your first order from the menu!</small></div>';
      return;
    }
    el.innerHTML = orders.map(o => `
      <div class="order-card">
        <div class="order-header">
          <span class="order-badge">Order #${o.id}</span>
          <span class="order-date">${o.order_date}</span>
        </div>
        <div class="order-meta">
          <span>👤 ${o.customer_name}</span>
          <span>🪑 Table ${o.table_number}</span>
        </div>
        <div class="order-items">🍽 ${o.items}</div>
        <div>Bill Total: <span class="order-total">₹${parseFloat(o.total).toFixed(0)}</span></div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Could not load orders</p></div>';
  }
}

// ── Toast ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Init ──────────────────────────────────────────────────────
